name: Rust CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'picture/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# 必要权限：允许使用 GITHUB_TOKEN 创建 Release 等写操作
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  SQLX_VERSION: "0.8.0"
  SQLX_FEATURES: "rustls,postgres"
  APP_USER: app
  APP_USER_PWD: secret
  APP_DB_NAME: agora

jobs:
  # 检测本次推送是否包含需要部署的文件变更
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deployable:
              - 'common/**'
              - 'infra/**'
              - 'service/**'
              - 'timer_tasker/**'
              - 'web_services/**'
              - 'migrations/**'
              - 'configuration/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'fly.toml'

  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semver tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG (expected vX.Y.Z)"
            exit 1
          fi

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit $GITHUB_SHA is not on origin/main"
            exit 1
          fi

  ci:
    name:  CI fmt, clippy, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/agora
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APP_ENV: local   # ✅ 全局环境变量

    steps:
      # 1️⃣ 下载仓库代码（完整历史）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # 2️⃣ 缓存 Cargo registry，加速依赖下载
      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      # 3️⃣ 缓存 Cargo target 目录，加速重复构建
      - name: Cache Cargo target
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-

      # 4️⃣ 安装 Rust 工具链及必要组件
      - name: Install Rust with tools
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt,clippy,llvm-tools-preview

      # 5️⃣ 安装 sqlx-cli，用于数据库迁移和 SQL 检查
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version=${{ env.SQLX_VERSION }} --features ${{ env.SQLX_FEATURES }} --no-default-features --locked

      # 6️⃣ 等待 Postgres 服务启动完成
      - name: Wait for Postgres to be ready
        run: |
          for i in {1..20}; do
            if PGPASSWORD=password pg_isready -h localhost -U postgres; then
              break
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done

      # 7️⃣ 创建应用数据库用户并授予权限
      - name: Create app user in Postgres
        run: |
          CREATE_QUERY="CREATE USER ${APP_USER} WITH PASSWORD '${APP_USER_PWD}';"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -c "${CREATE_QUERY}"
          GRANT_QUERY="ALTER USER ${APP_USER} CREATEDB;"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -c "${GRANT_QUERY}"

      # 7️⃣.1 创建应用数据库，并让 APP_USER 拥有所有权 (Superuser)
      - name: Create Application Database
        run: |
          # 创建数据库，并指定 APP_USER 为 Owner（幂等：已存在则跳过）
          PGPASSWORD="password" psql -U "postgres" -h "localhost" \
            -tc "SELECT 1 FROM pg_database WHERE datname = '${APP_DB_NAME}'" \
            | grep -q 1 || \
          PGPASSWORD="password" psql -U "postgres" -h "localhost" \
            -c "CREATE DATABASE ${APP_DB_NAME} OWNER ${APP_USER};"
          # PostgreSQL 15+ 默认移除了 public schema 的写权限，需显式授予
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -d "${APP_DB_NAME}" \
            -c "GRANT ALL ON SCHEMA public TO ${APP_USER};"

      # 7️⃣.2 安装 vector 扩展 (Superuser)
      - name: Install vector Extension
        run: |
          # 连接到新创建的数据库，并以 Superuser 身份安装扩展
          INSTALL_EXTENSION_QUERY="CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -d "${APP_DB_NAME}" -c "${INSTALL_EXTENSION_QUERY}"

      # 8️⃣ 确保本地脚本可执行
      - name: Ensure scripts executable
        run: chmod +x ./scripts/*.sh

      # 9️⃣ 执行数据库迁移
      - name: Migrate database
        run: SKIP_DOCKER=true ./scripts/init_db.sh

      # 🔟 格式检查
      - name: Check formatting
        run: cargo fmt -- --check

      # 1️⃣1️⃣ Clippy 代码静态分析
      - name: Run Clippy
        run: cargo clippy -- -D warnings

      # 1️⃣2️⃣ 运行单元测试
      - name: Run tests
        run: cargo test

  build-release:
    name: Build Github release
    runs-on: ubuntu-latest
    needs: [ci, validate-tag]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # 1️⃣ 检出完整代码（确保完整历史和 tags）
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # 2️⃣ 构建 release 版本（直接使用 workspace，无需再次 checkout）
      - name: Build release
        run: cargo build --release

      # 3️⃣ 设置 Node.js（用于 changelogithub 生成 changelog）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 4️⃣ 生成 changelog，并创建 GitHub Release
      - name: Generate Changelog and Create Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    needs: [build-release, validate-tag]

    if: startsWith(github.ref, 'refs/tags/v')
    concurrency: deploy-group
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fly-deploy:
    name: Fly Deploy
    runs-on: ubuntu-latest
    needs: [ci, detect-changes]
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.detect-changes.outputs.deployable == 'true'
    concurrency: deploy-group
    steps:
      # 1️⃣ 下载仓库代码（完整历史）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # 2️⃣ 安装 flyctl
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # 3️⃣ 部署应用到 Fly.io
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}