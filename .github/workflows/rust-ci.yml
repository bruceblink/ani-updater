name: Rust CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'picture/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'picture/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_VERSION: "0.8.0"
  SQLX_FEATURES: "rustls,postgres"
  APP_USER: app
  APP_USER_PWD: secret
  APP_DB_NAME: agora

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
      rust_changed: ${{ steps.filter.outputs.rust_changed }}
      db_changed: ${{ steps.filter.outputs.db_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deployable:
              - 'common/**'
              - 'infra/**'
              - 'service/**'
              - 'timer_tasker/**'
              - 'web_services/**'
              - 'migrations/**'
              - 'configuration/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
              - 'fly.toml'
            rust_changed:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
            db_changed:
              - 'migrations/**'
              - 'scripts/init_db.sh'

  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semver tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG (expected vX.Y.Z)"
            exit 1
          fi

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit $GITHUB_SHA is not on origin/main"
            exit 1
          fi

  fmt-clippy:
    name: CI fmt & clippy
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.rust_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache Cargo target
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: Install Rust with tools
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt,clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  test:
    name: CI tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.rust_changed == 'true' ||
      needs.detect-changes.outputs.db_changed == 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/agora
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APP_ENV: local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache Cargo target
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: Install Rust with tools
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version=${{ env.SQLX_VERSION }} --features ${{ env.SQLX_FEATURES }} --no-default-features --locked

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..20}; do
            if PGPASSWORD=password pg_isready -h localhost -U postgres; then
              break
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Create app user in Postgres
        run: |
          CREATE_QUERY="CREATE USER ${APP_USER} WITH PASSWORD '${APP_USER_PWD}';"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -c "${CREATE_QUERY}"
          GRANT_QUERY="ALTER USER ${APP_USER} CREATEDB;"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -c "${GRANT_QUERY}"

      - name: Create Application Database
        run: |
          PGPASSWORD="password" psql -U "postgres" -h "localhost" \
            -tc "SELECT 1 FROM pg_database WHERE datname = '${APP_DB_NAME}'" \
            | grep -q 1 || \
          PGPASSWORD="password" psql -U "postgres" -h "localhost" \
            -c "CREATE DATABASE ${APP_DB_NAME} OWNER ${APP_USER};"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -d "${APP_DB_NAME}" \
            -c "GRANT ALL ON SCHEMA public TO ${APP_USER};"

      - name: Install vector Extension
        run: |
          INSTALL_EXTENSION_QUERY="CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD="password" psql -U "postgres" -h "localhost" -d "${APP_DB_NAME}" -c "${INSTALL_EXTENSION_QUERY}"

      - name: Ensure scripts executable
        run: chmod +x ./scripts/*.sh

      - name: Migrate database
        run: SKIP_DOCKER=true ./scripts/init_db.sh

      - name: Run tests
        run: cargo test

  build-release:
    name: Build Github release
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test, validate-tag]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build release
        run: cargo build --release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Generate Changelog and Create Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    needs: [build-release, validate-tag]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
    concurrency: deploy-group
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fly-deploy:
    name: Fly Deploy
    runs-on: ubuntu-latest
    needs: [fmt-clippy, test, detect-changes]
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.detect-changes.outputs.deployable == 'true'
    concurrency: deploy-group
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
